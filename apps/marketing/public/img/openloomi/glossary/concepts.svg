<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="Georgia, 'Times New Roman', serif">
  <!-- Palette: blue=inputs, orange=judgement, green=surface/action -->
  <defs>
    <marker id="arrowblue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f3a6e"/>
    </marker>
    <marker id="arroworange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a85a1f"/>
    </marker>
    <marker id="arrowgreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f6e3a"/>
    </marker>
    <marker id="arrowgray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="760" fill="#fafaf6"/>

  <!-- Title + subtitle -->
  <text x="600" y="44" text-anchor="middle" font-size="26" font-weight="bold" fill="#1f3a6e">OpenLoomi — How the Concepts Fit Together</text>
  <text x="600" y="72" text-anchor="middle" font-size="14" font-style="italic" fill="#666">
    connectors / screen capture  ·  signals  ·  loop  ·  memory  ·  decision  ·  card  ·  attention  ·  approve  ·  action  ·  audit
  </text>

  <!-- =========================================================
       TOP BAR: User (sees Card, taps Approve)
       ========================================================= -->
  <rect x="80" y="110" width="1040" height="58" rx="8" fill="#eaeff7" stroke="#1f3a6e" stroke-width="1.5"/>
  <text x="600" y="135" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f3a6e">User — sees Card · taps Approve · receives the result</text>
  <text x="600" y="155" text-anchor="middle" font-size="12" font-style="italic" fill="#555">no Decision executes without Approve</text>

  <!-- Down arrow from user to pillars -->
  <line x1="600" y1="168" x2="600" y2="208" stroke="#888" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrowgray)"/>
  <text x="610" y="192" font-size="11" font-style="italic" fill="#555">approve / result</text>

  <!-- =========================================================
       PILLAR 1: INPUTS  (blue)
       ========================================================= -->
  <rect x="80" y="210" width="320" height="290" rx="10" fill="#e8f0fa" stroke="#1f3a6e" stroke-width="1.5"/>
  <text x="240" y="240" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f3a6e">Inputs</text>
  <text x="240" y="260" text-anchor="middle" font-size="12" font-style="italic" fill="#1f3a6e">where events come from</text>

  <text x="100" y="295" font-size="14" font-weight="bold" fill="#1f3a6e">Connectors</text>
  <text x="100" y="313" font-size="12" fill="#333">Gmail · Slack · iMessage · Telegram</text>
  <text x="100" y="329" font-size="12" fill="#333">WhatsApp · Lark · Calendar · GitHub</text>
  <text x="100" y="345" font-size="12" fill="#333">Linear · Notion · Outlook · ...</text>

  <text x="100" y="383" font-size="14" font-weight="bold" fill="#1f3a6e">Screen Capture</text>
  <text x="100" y="401" font-size="12" fill="#333">macOS only · press a shortcut</text>
  <text x="100" y="417" font-size="12" fill="#333">screen memories land in Memory</text>
  <text x="100" y="433" font-size="12" fill="#333">directly — they do not tick Loop</text>

  <text x="100" y="475" font-size="11" font-style="italic" fill="#555">"raw events for the rest of the pipeline"</text>

  <!-- =========================================================
       PILLAR 2: JUDGEMENT & STORE  (orange)
       ========================================================= -->
  <rect x="440" y="210" width="320" height="290" rx="10" fill="#fbeedf" stroke="#a85a1f" stroke-width="1.5"/>
  <text x="600" y="240" text-anchor="middle" font-size="18" font-weight="bold" fill="#a85a1f">Judgement &amp; Store</text>
  <text x="600" y="260" text-anchor="middle" font-size="12" font-style="italic" fill="#a85a1f">signals become decisions · long-lived context</text>

  <text x="460" y="295" font-size="14" font-weight="bold" fill="#a85a1f">Signals</text>
  <text x="460" y="313" font-size="12" fill="#333">one raw event pulled from a</text>
  <text x="460" y="329" font-size="12" fill="#333">Connector. The only thing Loop</text>
  <text x="460" y="345" font-size="12" fill="#333">consumes on a tick.</text>

  <text x="460" y="383" font-size="14" font-weight="bold" fill="#a85a1f">Loop</text>
  <text x="460" y="401" font-size="12" fill="#333">judgement engine — reads Memory,</text>
  <text x="460" y="417" font-size="12" fill="#333">writes context back. Produces</text>
  <text x="460" y="433" font-size="12" fill="#333">typed Decisions.</text>

  <text x="460" y="471" font-size="11" font-style="italic" fill="#555">"the only place Decisions come from"</text>

  <!-- =========================================================
       PILLAR 3: SURFACE & ACTION  (green)
       ========================================================= -->
  <rect x="800" y="210" width="320" height="290" rx="10" fill="#e8f3ea" stroke="#1f6e3a" stroke-width="1.5"/>
  <text x="960" y="240" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f6e3a">Surface &amp; Action</text>
  <text x="960" y="260" text-anchor="middle" font-size="12" font-style="italic" fill="#1f6e3a">show · approve · execute · persist</text>

  <text x="820" y="295" font-size="14" font-weight="bold" fill="#1f6e3a">Decision</text>
  <text x="820" y="313" font-size="12" fill="#333">typed action + confidence +</text>
  <text x="820" y="329" font-size="12" fill="#333">preview.</text>

  <text x="820" y="361" font-size="14" font-weight="bold" fill="#1f6e3a">Card</text>
  <text x="820" y="379" font-size="12" fill="#333">UI rendering of the Decision —</text>
  <text x="820" y="395" font-size="12" fill="#333">bubble / queue / 4-button tray.</text>

  <text x="820" y="427" font-size="14" font-weight="bold" fill="#1f6e3a">Attention Agent (Loomi / Pet)</text>
  <text x="820" y="445" font-size="12" fill="#333">the desktop messenger.</text>
  <text x="820" y="461" font-size="12" fill="#333">Waits for Approve.</text>

  <text x="820" y="488" font-size="11" font-style="italic" fill="#555">"moves a Decision into the world"</text>

  <!-- =========================================================
       INTER-PILLAR ARROWS  (top half of pillars, horizontal)
       ========================================================= -->
  <!-- Inputs → Judgement (signals) -->
  <line x1="400" y1="320" x2="438" y2="320" stroke="#1f3a6e" stroke-width="2" marker-end="url(#arrowblue)"/>
  <text x="419" y="312" text-anchor="middle" font-size="11" font-style="italic" fill="#1f3a6e">signals</text>

  <!-- Judgement → Surface (decision) -->
  <line x1="760" y1="320" x2="798" y2="320" stroke="#a85a1f" stroke-width="2" marker-end="url(#arroworange)"/>
  <text x="779" y="312" text-anchor="middle" font-size="11" font-style="italic" fill="#a85a1f">decision</text>

  <!-- =========================================================
       BOTTOM BAR: Persistence  (Memory + Audit Log)
       ========================================================= -->
  <rect x="80" y="540" width="1040" height="100" rx="10" fill="#f2f0ea" stroke="#777" stroke-width="1.2"/>
  <text x="600" y="568" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">Memory + Audit Log</text>
  <text x="600" y="592" text-anchor="middle" font-size="12" fill="#333">
    Memory holds every screen capture, message, summary, and insight. The Audit Log records what Decision ran and with what result.
  </text>
  <text x="600" y="612" text-anchor="middle" font-size="12" font-style="italic" fill="#555">
    Every approved Action writes here, so the next Loop tick has sharper context — and you can always see who did what.
  </text>

  <!-- =========================================================
       DOWN ARROWS: pillars → Persistence
       ========================================================= -->
  <!-- Pillar 2 (Judgement) writes to Memory/Audit -->
  <line x1="600" y1="500" x2="600" y2="538" stroke="#a85a1f" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arroworange)"/>
  <text x="610" y="522" font-size="11" font-style="italic" fill="#a85a1f">writes back</text>

  <!-- Pillar 3 (Surface/Action) also writes after Approve/Execute -->
  <line x1="960" y1="500" x2="960" y2="538" stroke="#1f6e3a" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrowgreen)"/>
  <text x="970" y="522" font-size="11" font-style="italic" fill="#1f6e3a">executed actions</text>

  <!-- Pillar 1 Screen Capture → Memory (direct side path) -->
  <path d="M 240 478 Q 240 510 280 540 L 350 540" fill="none" stroke="#1f3a6e" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrowblue)"/>
  <text x="252" y="515" font-size="11" font-style="italic" fill="#1f3a6e">screen mems</text>

  <!-- =========================================================
       BOTTOM NOTE
       ========================================================= -->
  <text x="600" y="678" text-anchor="middle" font-size="12" font-style="italic" fill="#777">
    Connectors do double duty: they pull events into the system <tspan font-weight="bold" fill="#555">and</tspan> execute approved Actions after Approve.
  </text>
  <text x="600" y="700" text-anchor="middle" font-size="12" font-style="italic" fill="#777">
    Attention Agent is the messenger — every bubble it shows is a Decision Loop has already produced.
  </text>
  <text x="600" y="722" text-anchor="middle" font-size="12" font-style="italic" fill="#777">
    Screen Capture is a separate input path: it never produces Signals, only screen memories inside Memory.
  </text>
</svg>
