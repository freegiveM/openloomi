<!doctype html>
<!--
  Loomi · speech bubble (above the pet)

  Visual style mirrors the demo at
  /Users/timi/Downloads/openloomi-aha-moment-demo: a light, orange-bordered
  glass bubble with a downward-pointing tail that anchors the bubble to
  the pet's top. A small blue dot below the tail acts as the "needs
  input" notification indicator — visible only when there's a pending
  decision; the bubble itself hides when the pending bucket is empty.

  Layout (400×110 logical):
    · The window is 400×110 to fit a 2-line speech (with 28px
      border-radius and 14px×22px padding), the 22×22 downward tail,
      and the 14px blue dot. The tail tip sits ~17px below the
      speech's bottom, so a 2-line speech lands its tip at y≈106
      (within the 110px window); the dot's `bottom: 6px` lands its
      center at y≈97, which slightly overlaps the tail's body —
      acceptable since both are small accents around the same
      downward axis.
    · The body is transparent; only `.speech` and `.dot` paint.
    · Tail is rendered as a rotated square (CSS `::after`), matching the
      demo's `.speech::after` (rgba(255, 161, 73, 0.28) border on
      rgba(255, 255, 255, 0.94) bg).
    · Position: above the pet, horizontally centered. Tauri-side
      `aux_position::position_above_pet` computes this from the pet's
      outer_position; on cold boot the bubble's tail tip sits ~13px
      above the pet's top (BUBBLE_H=110, PET_AUX_GAP=4).

  State contract:
    · Listens for `loop:decision` events. Payload shape:
        { id, type, title, dialogue, priority, has_pending }
    · When `has_pending` is true, renders the dialogue (or a short
      type-specific phrase if no dialogue is provided). When false,
      the body becomes empty and `.dot` fades out — visibility is
      actually controlled by the host (hides the window entirely when
      pending is empty), so this client-side fade is just for the brief
      race between payload arrival and the host's hide.
    · Click → emit `pet:open-card`. The host shows the larger card
      window in its place. The pet's own click handler also routes
      here when there's a pending decision.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Loomi · bubble</title>
    <style>
      :root {
        --bubble-w: 320px;
        --bubble-h: 84px;
        --orange: rgba(255, 161, 73, 0.28);
        --ink: #1f2937;
        --muted: #6b7280;
        --bubble-bg: rgba(255, 255, 255, 0.94);
        --blue: #2b8af7;
        --shadow:
          0 14px 30px rgba(255, 161, 73, 0.12),
          0 4px 10px rgba(15, 23, 42, 0.08);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        -webkit-user-select: none;
        user-select: none;
        font-family:
          system-ui,
          -apple-system,
          "PingFang SC",
          "Segoe UI",
          sans-serif;
      }
      body {
        width: var(--bubble-w);
        height: var(--bubble-h);
        overflow: visible;
        cursor: pointer;
      }
      .stage {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding-top: 8px;
      }

      /* The bubble itself — light, orange-bordered, generous radius.
         Matches `.speech` in the demo. Sized small (max-width 280px,
         padding 10×16, font 14-15px) so the bubble doesn't dominate
         the desktop and the pet stays the visual anchor. */
      .speech {
        position: relative;
        max-width: 280px;
        padding: 9px 16px;
        border: 1.5px solid var(--orange);
        border-radius: 18px;
        background: var(--bubble-bg);
        box-shadow: var(--shadow);
        color: var(--ink);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.3;
        text-align: center;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        transform-origin: 50% calc(100% + 10px);
        transition:
          opacity 180ms ease,
          transform 220ms ease;
      }
      body.idle .speech {
        /* Fully hide the bubble in idle / no-pending state. Previously
           this only dimmed to 0.55, which still surfaced the "All clear"
           text on every cold boot — feedback that the bubble has no
           useful info before the first decision arrives. The text is
           kept in STATE_PHRASES so the dev panel can still flip into it
           for visual testing; we just don't render it visibly. */
        opacity: 0;
        pointer-events: none;
      }
      body.idle .speech::after {
        opacity: 0;
      }

      /* Downward-pointing tail (matches `.speech::after` in the demo).
         The rotated square shares the bubble's bg + border. */
      .speech::after {
        content: "";
        position: absolute;
        bottom: -8px;
        left: 50%;
        width: 14px;
        height: 14px;
        border-right: 1.5px solid var(--orange);
        border-bottom: 1.5px solid var(--orange);
        background: var(--bubble-bg);
        transform: translateX(-50%) rotate(45deg);
      }

      /* Blue notification dot (matches `.speech::before` in the demo).
         Fades out when the bubble is in the idle / no-pending state. */
      .dot {
        position: absolute;
        bottom: 4px;
        left: 50%;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--blue);
        box-shadow:
          0 0 0 4px rgba(43, 138, 247, 0.12),
          0 4px 10px rgba(43, 138, 247, 0.28);
        transform: translateX(-50%);
        transition:
          opacity 220ms ease,
          transform 220ms ease;
      }
      body.idle .dot {
        opacity: 0;
        transform: translateX(-50%) scale(0.6);
      }

      /* Compact text mode for short lines (e.g. "早安" or "All clear"). */
      .speech .lead {
        display: block;
        font-size: 14px;
        letter-spacing: 0.01em;
      }
      .speech .lead b {
        font-weight: 800;
      }
      .speech .sub {
        display: block;
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        margin-top: 1px;
      }
    </style>
  </head>
  <body class="idle">
    <div class="stage" id="stage">
      <div class="speech" id="speech" role="button" tabindex="0">
        <span class="lead" id="lead">All clear</span>
        <span class="sub" id="sub"></span>
      </div>
      <span class="dot" id="dot" aria-hidden="true"></span>
    </div>

    <script>
      (function () {
        "use strict";

        const body = document.body;
        const lead = document.getElementById("lead");
        const sub = document.getElementById("sub");

        // Short, demo-style phrases keyed by decision type. Used when the
        // server doesn't ship a tailored `dialogue` string. Mirror the
        // aha-moment-demo tone: a friendly "what's Loomi doing" line on
        // top, a softer sub line describing the prepared action.
        const TYPE_PHRASES = {
          rsvp: {
            lead: "This RSVP needs your call",
            sub: "draft ready to send",
          },
          draft_reply: {
            lead: "This email is waiting on you",
            sub: "reply drafted",
          },
          review_pr: {
            lead: "PR is waiting for review",
            sub: "I've already taken a look",
          },
          slack_reply: {
            lead: "Someone @-mentioned you",
            sub: "pulling context first",
          },
          deadline_reminder: {
            lead: "Deadline approaching",
            sub: "want me to set a reminder?",
          },
          release_plan: {
            lead: "Plan needs your sign-off",
            sub: "small change",
          },
        };

        // Pet-state driven phrases. Surfaced when there's no pending
        // decision so the bubble still has something on-screen while the
        // pet sweeps / thinks / sleeps. The `idle` entry is intentionally
        // present (for dev-panel testing + accessibility / a11y fallback)
        // but the bubble's idle class makes it invisible in the idle
        // state — see `renderState` below. Updated together with the
        // STATE_PHRASES definition in the dev panel; keep in sync.
        const STATE_PHRASES = {
          idle: { lead: "All clear", sub: "" },
          sleeping: { lead: "zzz", sub: "circle back in the morning" },
          sweeping: {
            lead: "Cleaning up noise",
            sub: "only the real ones left",
          },
          happy: { lead: "Nice — that worked", sub: "tap to review" },
          juggling: { lead: "Lots open", sub: "pick one when you're ready" },
          needsinput: { lead: "Hey — I need a call", sub: "tap to decide" },
          thinking: { lead: "Just a sec", sub: "reading the room" },
          working: { lead: "On it", sub: "I'll ping you when ready" },
          greet: { lead: "Hey", sub: "I see you" },
          // Surfaced by the watcher after a decision moves to `done`
          // but before the user clicks the bubble. Deliberately distinct
          // from `happy` so the pet reads as "handing off" rather than
          // celebrating — the cue is "review when you're ready".
          presenting: {
            lead: "All wrapped up — ready when you are",
            sub: "tap to view",
          },
          // Emitted once by the watcher on a fresh install when no
          // ANTHROPIC_* env key is set AND `~/.openloomi/loop/decisions.json`
          // doesn't exist yet. Tapping the bubble opens the pet card,
          // which in turn surfaces the AI settings CTA via its `apply()`
          // flow (see Fix 1 on `GET /api/preferences/ai`).
          "needs-setup": {
            lead: "Let's get you set up",
            sub: "tap me to add your AI provider",
          },
        };

        // A pending decision wins over state — once `loop:decision`
        // arrives with an id we keep showing it until the watcher
        // explicitly clears (empty payload) or the user acts. State
        // events update the *fallback* phrasing only.
        let currentDecision = null;
        let currentState = "idle";
        // One-shot transient message set by a `loop:state` event that
        // carries a `monologue` string (e.g. a cron completion). Consumed
        // on the next render and cleared, so the bubble's re-show cycle
        // (`pet:bubble-shown`) won't resurrect stale text. The following
        // monologue-free `loop:state` reverts to STATE_PHRASES.
        let pendingMonologue = null;

        function renderState() {
          // The "idle" CSS class is used to dim/hide the bubble. We only
          // apply it when the pet's *state* is literally idle AND there's
          // no pending monologue — i.e. there's genuinely nothing to say.
          // Other states (thinking / sweeping / working / etc.) still
          // surface their phrases even when there's no pending decision, so
          // the bubble keeps the user oriented while the pet is doing
          // background work.
          const hasMonologue = pendingMonologue !== null;
          const noContent = currentState === "idle" && !hasMonologue;
          body.classList.toggle("idle", noContent);
          if (hasMonologue) {
            // Transient message wins over the static STATE_PHRASES table
            // for this one render, then clears.
            lead.textContent = pendingMonologue;
            sub.textContent = "";
            pendingMonologue = null;
          } else {
            const phrase = STATE_PHRASES[currentState] || STATE_PHRASES.idle;
            lead.textContent = phrase.lead;
            sub.textContent = phrase.sub || "";
          }
        }

        function applyDecision(p) {
          if (!p || !p.id) {
            currentDecision = null;
            renderState();
            return;
          }
          currentDecision = p;
          body.classList.remove("idle");
          const phrase = TYPE_PHRASES[p.type];
          if (p.dialogue && p.dialogue.trim()) {
            // If the server provided a tailored dialogue, prefer it but
            // split on the first sentence so the sub line can carry the
            // call-to-action verb.
            const split = p.dialogue.split(/[—\.\!\?]/);
            lead.textContent = (split[0] || p.dialogue).trim();
            sub.textContent = (split[1] || "").trim();
          } else if (phrase) {
            lead.textContent = phrase.lead;
            sub.textContent = phrase.sub;
          } else {
            lead.textContent = p.title || "Needs your call";
            sub.textContent = "";
          }
        }

        function applyState(p) {
          // Accept either `{ state, monologue }` (watcher) or a bare
          // string (dev-panel chips), gracefully.
          const next =
            (p && typeof p === "object" && p.state) ||
            (typeof p === "string" ? p : null) ||
            "idle";
          currentState = next;
          if (
            p &&
            typeof p === "object" &&
            typeof p.monologue === "string" &&
            p.monologue.length > 0
          ) {
            pendingMonologue = p.monologue;
          }
          if (!currentDecision) {
            renderState();
          }
        }

        const speech = document.getElementById("speech");
        speech.addEventListener("click", () => {
          const t = window.__TAURI__;
          if (!t || !t.event || !t.event.emit) return;
          t.event.emit("pet:open-card");
        });
        speech.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            speech.click();
          }
        });

        // Auto-dismiss the bubble after a short window so it doesn't
        // sit on top of the card or block the user's view of other
        // windows. We use a JS `setTimeout` here (rather than a Rust
        // timer thread) because the bubble already owns the "is there
        // a fresh decision?" lifecycle — every `loop:decision` event
        // resets the timer, so a stream of watcher re-emits doesn't
        // cancel the dismiss. The host listens for the auto-close
        // event and hides the bubble window.
        const AUTO_DISMISS_MS = 4500;
        // On a fresh install the bubble carries the "needs-setup" CTA
        // (the watcher emits `loop:state` with `needs-setup` once when
        // `~/.openloomi/loop/decisions.json` is missing and no env API
        // key is set). The default 4.5s dismiss is too aggressive for
        // that prompt — users miss the sub line ("tap me to add your
        // AI provider") and assume the app is dead. Give it more
        // breathing room; the user can still click through to the card
        // early, and any subsequent `loop:decision` / state flip falls
        // back to AUTO_DISMISS_MS as expected.
        const SETUP_DISMISS_MS = 12000;
        // `presenting` is a deliberate handoff state — the user is
        // being shown a freshly-done decision. The bubble text is the
        // call-to-action, so 4.5 s is too short: the user is mid-task
        // when the loop finishes, and a brief flash makes the
        // notification easy to miss. 8 s gives enough breathing room
        // for the user to read both lines without forcing a click.
        const PRESENTING_DISMISS_MS = 8000;
        let autoHideTimer = null;
        function scheduleAutoHide() {
          if (autoHideTimer) clearTimeout(autoHideTimer);
          const delay =
            currentState === "needs-setup"
              ? SETUP_DISMISS_MS
              : currentState === "presenting"
                ? PRESENTING_DISMISS_MS
                : AUTO_DISMISS_MS;
          autoHideTimer = setTimeout(() => {
            autoHideTimer = null;
            const t = window.__TAURI__;
            if (t && t.event && t.event.emit) {
              t.event.emit("pet:bubble-auto-close");
            }
          }, delay);
        }
        function cancelAutoHide() {
          if (autoHideTimer) {
            clearTimeout(autoHideTimer);
            autoHideTimer = null;
          }
        }

        const tauri = window.__TAURI__;
        if (tauri && tauri.event && tauri.event.listen) {
          tauri.event.listen("loop:decision", (e) => {
            applyDecision((e && e.payload) || {});
            scheduleAutoHide();
          });
          // Mirror the watcher's `loop:state` emissions so flipping
          // thinking / sweeping / sleeping / etc. actually changes the
          // bubble content. See `pet::watcher::map_state_to_pet`.
          tauri.event.listen("loop:state", (e) => {
            applyState((e && e.payload) || null);
            // State flips alone shouldn't keep the bubble up forever —
            // they don't carry a decision, so the decision-driven timer
            // doesn't restart. Arm one here too so a pure state change
            // (e.g. "thinking" → "happy") still fades the bubble.
            scheduleAutoHide();
          });
          // Host-driven re-show (e.g. after the user closes the card,
          // `pet:close-card` re-shows the bubble). The content is
          // already on-screen; we just need to re-arm the dismiss
          // timer so the bubble doesn't outlive its welcome.
          tauri.event.listen("pet:bubble-shown", () => {
            scheduleAutoHide();
          });
        }

        applyDecision(null);
      })();
    </script>
  </body>
</html>
