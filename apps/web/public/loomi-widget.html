<!doctype html>
<!--
  Loomi · the pet widget

  Minimal frameless pet. No deck, no monologue panel, no tray — just a
  draggable fox on the desktop that:
    · listens to `loop:state` events from the Tauri host and swaps the
      displayed fox image to match the current state
    · uses the native Tauri `startDragging()` API so the whole 168×168
      window follows the pointer (not the image inside the window)
    · emits `pet:open-dashboard` on a real click (pointerup with no
      significant drag) so the host can show the main window

  The drag-vs-click distinction matters: without it, every release
  after a reposition would re-open the main window. We track total
  pointer travel between down and up; >4px = drag, ≤4px = click.

  State key → image filename is a flat lookup table. Anything not in
  the table falls back to `loomi-idle.png` so a typo'd state name from
  the host can never paint a blank frame.

  This file lives at the public root (not under loomi-pet/) so the
  loomi-pet/ directory stays purely a static asset bag. The Tauri
  `tauri.conf.json` window URL points here.

  In standalone preview (open this file in a browser without Tauri),
  the body grows to fill the viewport so the user can see the whole
  pet at a useful size, and the drop shadow is dropped (it would
  stack against the page background).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Loomi</title>
    <style>
      :root {
        /* Visual size in CSS px. The Tauri window is 168×168 logical, so
       this matches what the user sees on the desktop. In standalone
       preview the body grows to 100vw × 100vh, so this still keeps
       the fox at its natural size. */
        --size: 168px;
      }

      /* Standalone-preview fallback: when the page is opened in a plain
     browser (no Tauri), the body fills the viewport and the pet
     sits in the middle. The Tauri window has its own 168×168 box
     so this style only kicks in when `__TAURI__` is missing. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        -webkit-user-select: none;
        user-select: none;
        font-family: system-ui, sans-serif;
        /* #392 — let clicks on transparent corners of the sprite
           pass through to the underlying app instead of being eaten
           by the 168×168 NSPanel frame. Explicit opt-back on `.fox`,
           `.idle-pill`, `#pet-menu`, and `#pet-menu *` below
           re-enables pointer events for the bits that need to
           receive them. The `.pending-badge` block stays
           `pointer-events: none` because it has no handler and is
           a 22×22 DOM rect the alpha hit-tester can't see. */
        pointer-events: none;
      }
      body {
        width: var(--size);
        height: var(--size);
        overflow: hidden;
        cursor: grab;
      }
      body.dragging {
        cursor: grabbing;
      }

      /* Long-press indicator for issue #314 — when the user holds the
     pet without releasing or moving past DRAG_THRESHOLD for ≥ 600ms,
     show three dots under the fox so they know a menu is about to
     open. The dots live as a pseudo-element on the fox so they
     track the sprite position across themes without extra DOM. */
      .fox::after {
        content: "· · ·";
        position: absolute;
        left: 50%;
        bottom: 4px;
        transform: translateX(-50%);
        font-size: 16px;
        line-height: 1;
        color: rgba(255, 255, 255, 0.92);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
        letter-spacing: 3px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s ease-in;
      }
      body.dragging.longpress .fox::after {
        opacity: 1;
      }

      /* The fox image. Per-state wobble animations are applied via the
     `[data-state]` attribute set by the JS bridge — each state
     triggers a different keyframe (wave / hop / tilt / nod / ...).
     The image is centered in its container; in Tauri the container
     is the whole window, in standalone it is the centered stage. */
      .fox {
        position: absolute;
        left: 50%;
        top: 50%;
        width: var(--size);
        height: var(--size);
        transform: translate(-50%, -50%);
        transform-origin: 50% 95%;
        display: block;
        pointer-events: auto;
        -webkit-user-drag: none;
        user-drag: none;
        animation: pet-bob 3.4s ease-in-out infinite;
      }

      /* #392 — opt-back group. The body / html rule above sets
         `pointer-events: none` so transparent corners of the sprite
         pass clicks through. This rule explicitly re-enables pointer
         events for the three chrome bits that need to receive them:
         the status pill (`.idle-pill`), the right-click menu
         (`#pet-menu`), and every descendant of the menu (`#pet-menu
         *`, so clicks on nested `<button data-op="…">` elements
         reach the menu's click handler). `.fox` is opted back in by
         its own rule above. `.pending-badge` stays opted OUT — it
         has no handler. */
      .idle-pill,
      #pet-menu,
      #pet-menu * {
        pointer-events: auto;
      }

      .pending-badge {
        position: absolute;
        z-index: 5;
        top: 7px;
        right: 7px;
        min-width: 22px;
        height: 22px;
        padding: 0 6px;
        box-sizing: border-box;
        border: 2px solid rgba(255, 255, 255, 0.92);
        border-radius: 11px;
        background: #dc2626;
        color: #fff;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        pointer-events: none;
      }
      .pending-badge.visible {
        display: flex;
      }

      /* #365 — idle status pill. Anchored at the same top-right corner
         as `.pending-badge`, but slightly offset so a populated
         pending badge (count > 0) doesn't collide with it. The pill
         is keyboard-focusable (Enter / Space emit `pet:open-status`)
         so the user can reach the compact card without a mouse.
         Hidden by default; `applyIdlePill()` toggles `.visible`
         based on `currentState === "idle"` AND pendingCount === 0.
         The 14×14 dot mirrors the loop's enabled flag: green when
         live, amber when paused, red when the watcher reported a
         failure on a source (future-proofed — the watcher doesn't
         currently emit per-source failure state, so today the dot
         is either green or amber). */
      .idle-pill {
        position: absolute;
        z-index: 6;
        top: 7px;
        right: 7px;
        display: none;
        align-items: center;
        gap: 6px;
        height: 22px;
        padding: 0 10px 0 8px;
        border-radius: 11px;
        background: rgba(15, 23, 42, 0.78);
        color: rgba(255, 255, 255, 0.95);
        font-size: 10px;
        font-weight: 600;
        line-height: 1;
        letter-spacing: 0.01em;
        cursor: pointer;
        outline: none;
        -webkit-user-select: none;
        user-select: none;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        white-space: nowrap;
        max-width: 156px;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: background 0.15s ease;
      }
      .idle-pill.visible {
        display: inline-flex;
      }
      .idle-pill:hover,
      .idle-pill:focus-visible {
        background: rgba(15, 23, 42, 0.92);
      }
      .idle-pill:focus-visible {
        box-shadow:
          0 0 0 2px rgba(43, 138, 247, 0.6),
          0 4px 10px rgba(0, 0, 0, 0.28);
      }
      /* When the pending badge is also visible (a queued decision
         just landed), nudge the pill down so the two chrome pieces
         stack instead of overlapping. The badge takes its own slot
         at the same top-right; we shift the pill below it. */
      .pending-badge.visible ~ .idle-pill {
        top: 35px;
      }
      .idle-pill .idle-dot {
        flex: 0 0 auto;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #34d399;
        box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.28);
      }
      .idle-pill[data-enabled="false"] .idle-dot {
        background: #f59e0b;
        box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.28);
      }
      .idle-pill[data-enabled="failure"] .idle-dot {
        background: #ef4444;
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.28);
      }
      .idle-pill .idle-label {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* State-specific animations — kept in sync with the demo's
     keyframes. If you add a new state, add a rule here AND an entry
     in the STATE_IMAGES map below. */
      .fox[data-state="greet"] {
        animation: pet-wave 2.4s ease-in-out infinite;
      }
      .fox[data-state="happy"] {
        animation: pet-hop 2.2s ease-in-out infinite;
      }
      .fox[data-state="thinking"] {
        animation: pet-tilt 2.6s ease-in-out infinite;
      }
      .fox[data-state="sweeping"] {
        animation: pet-sweep 2.8s ease-in-out infinite;
      }
      .fox[data-state="juggling"] {
        animation: pet-juggle 2.2s ease-in-out infinite;
      }
      .fox[data-state="working"] {
        animation: pet-nod 3.4s ease-in-out infinite;
      }
      .fox[data-state="needsinput"] {
        animation: pet-lean 2.6s ease-in-out infinite;
      }
      .fox[data-state="sleeping"] {
        animation: pet-breathe 4s ease-in-out infinite;
      }

      @keyframes pet-bob {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(0) rotate(-1deg);
        }
        50% {
          transform: translate(-50%, -50%) translateY(-4px) rotate(1deg);
        }
      }
      @keyframes pet-breathe {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          transform: translate(-50%, -50%) scale(1.015);
        }
      }
      @keyframes pet-tilt {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(-3deg);
        }
        50% {
          transform: translate(-50%, -50%) rotate(3deg);
        }
      }
      @keyframes pet-sweep {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(-2deg) translateX(0);
        }
        50% {
          transform: translate(-50%, -50%) rotate(2deg) translateX(2px);
        }
      }
      @keyframes pet-juggle {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(0) rotate(-2deg);
        }
        50% {
          transform: translate(-50%, -50%) translateY(-5px) rotate(2deg);
        }
      }
      @keyframes pet-nod {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(0);
        }
        50% {
          transform: translate(-50%, -50%) translateY(1px);
        }
      }
      @keyframes pet-lean {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(0);
        }
        50% {
          transform: translate(-50%, -50%) rotate(3deg);
        }
      }
      @keyframes pet-hop {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(0) rotate(0) scale(1);
        }
        35% {
          transform: translate(-50%, -50%) translateY(-10px) rotate(-3deg)
            scale(1.03);
        }
        70% {
          transform: translate(-50%, -50%) translateY(-2px) rotate(2deg)
            scale(0.99);
        }
      }
      @keyframes pet-wave {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(0);
        }
        25% {
          transform: translate(-50%, -50%) rotate(-2deg);
        }
        75% {
          transform: translate(-50%, -50%) rotate(2deg);
        }
      }

      /* ---- Custom right-click menu ------------------------------------
       The 168×168 window is tiny, so the menu is positional (anchored
       down-right from the click) and clamped to the window bounds so
       it never overflows or clips. Background uses blur + dark glass
       so the menu reads against any wallpaper. */
      #pet-menu {
        position: fixed;
        z-index: 9999;
        min-width: 96px;
        /* The pet window is 168×168 but the menu (theme picker + a
           few shortcuts) is ~250px tall, so we cap the height and let
           it scroll rather than clip the Quit button. `calc(100vh -
           8px)` adapts to both Tauri (vh = window height = 168) and
           standalone preview (vh = browser viewport). */
        max-height: calc(100vh - 8px);
        overflow-y: auto;
        padding: 4px;
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        box-shadow: none;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 12px;
        color: #f1f5f9;
        display: none;
        -webkit-user-select: none;
        user-select: none;
      }
      /* Slim webkit scrollbar so the scroll affordance doesn't crowd
         the 12px menu text. Falls back to platform default in
         non-webkit browsers (rare for the Tauri webview, but safe). */
      #pet-menu::-webkit-scrollbar {
        width: 6px;
      }
      #pet-menu::-webkit-scrollbar-track {
        background: transparent;
      }
      #pet-menu::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
      }
      #pet-menu::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
      }
      #pet-menu.visible {
        display: block;
      }
      #pet-menu button {
        display: block;
        width: 100%;
        padding: 4px 12px;
        margin: 0;
        background: transparent;
        border: 0;
        color: inherit;
        font: inherit;
        text-align: left;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
      }
      #pet-menu button:hover,
      #pet-menu button:focus-visible {
        background: rgba(255, 255, 255, 0.08);
        outline: 0;
      }
      #pet-menu hr {
        border: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        margin: 2px 2px;
      }
      /* Theme picker tick — only the active theme shows the ✓.
         Kept out of the button text so the label can wrap on long
         custom-theme names without reflowing the tick. */
      .menu-tick {
        display: inline-block;
        width: 12px;
        margin-right: 4px;
        opacity: 0;
        color: #34d399;
        font-weight: 700;
      }
      .menu-tick.active {
        opacity: 1;
      }
      /* Subtle separator within the theme list — separates built-ins
         from custom themes the user has added. */
      .menu-separator {
        padding: 2px 12px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <img class="fox" id="fox" data-state="idle" alt="Loomi" draggable="false" />
    <span class="pending-badge" id="pending-badge" aria-hidden="true"></span>
    <!-- #365 — idle status affordance. The pill is hidden by default
         and made visible by `applyIdlePill()` when state === "idle"
         AND no pending decisions exist. Clicking (or pressing
         Enter / Space while focused) emits `pet:open-status`, which
         the host turns into a `show_card_compact_window` call. The
         longer "View status" suffix lives on the right side and
         truncates with an ellipsis if the user's locale is wider
         than 156px. -->
    <span
      class="idle-pill"
      id="idle-pill"
      role="status"
      aria-live="polite"
      tabindex="0"
      data-enabled="true"
    >
      <span class="idle-dot" aria-hidden="true"></span>
      <span class="idle-label" id="idle-pill-label">Loomi is on watch</span>
    </span>

    <div id="pet-menu" role="menu" aria-hidden="true">
      <button type="button" data-op="open" role="menuitem">Open Loomi</button>
      <button type="button" data-op="settings" role="menuitem">Settings</button>
      <hr />
      <div class="menu-separator">Theme</div>
      <button type="button" data-op="theme-fox" role="menuitem">
        <span class="menu-tick active" data-theme-tick="fox">✓</span>Fox
      </button>
      <button type="button" data-op="theme-capybara" role="menuitem">
        <span class="menu-tick" data-theme-tick="capybara">✓</span>Capybara
      </button>
      <!-- Custom theme buttons injected at boot by applyConfig(view). -->
      <hr />
      <button type="button" data-op="quit" role="menuitem">Quit</button>
    </div>

    <!-- #392 — alpha-aware hit-test canvas. The 168×168 backing
         store mirrors PET_W / PET_H from `pet::window::build_pet_window`
         so screen-to-local CSS conversion doesn't need to scale.
         `hidden` keeps it out of the accessibility tree and out of
         the visual layout; the JS reads its 2D context directly in
         `adoptMaskFromLoadedImage`. -->
    <canvas id="hit-mask" width="168" height="168" hidden></canvas>

    <script>
      (function () {
        "use strict";

        // Two built-in themes ship with the app. Each maps a state key
        // to a PNG filename in the theme's directory. The directory
        // layout matches `apps/web/public/loomi-pet/assets/<theme>/`,
        // which is bundled by the public/ resource pattern in
        // tauri.conf.json (`../.next/standalone/apps/web/public/**/*`).
        //
        // `juggling` is reserved for actual concurrent work. Queued Loop
        // decisions are represented by the small pending-count badge and
        // do not select the main pose. `presenting` uses the handoff pose
        // that previously made the multitasking state look like a speech.
        const BUILTIN_THEMES = {
          fox: {
            baseDir: "loomi-pet/assets/fox/",
            states: {
              idle: "loomi-idle.png",
              thinking: "loomi-thinking.png",
              sweeping: "loomi-sweeping.png",
              working: "loomi-working.png",
              needsinput: "loomi-needsinput.png",
              greet: "loomi-greet.png",
              sleeping: "loomi-sleeping.png",
              juggling: "loomi-juggling.png",
              happy: "loomi-happy.png",
              presenting: "loomi-presenting.png",
            },
          },
          capybara: {
            baseDir: "loomi-pet/assets/capybara/",
            states: {
              idle: "capybara-idle.png",
              thinking: "capybara-thinking.png",
              sweeping: "capybara-sweeping.png",
              working: "capybara-working.png",
              needsinput: "capybara-needsinput.png",
              greet: "capybara-idle.png",
              sleeping: "capybara-sleeping.png",
              juggling: "capybara-juggling.png",
              happy: "capybara-happy.png",
              presenting: "capybara-presenting.png",
            },
          },
        };
        const FALLBACK = "loomi-pet/assets/fox/loomi-idle.png";

        // ===== #392 — alpha-aware hit-test module =========================
        // Three layers cooperate so the 168×168 NSPanel only claims
        // events on opaque pixels of the sprite:
        //   (1) CSS `pointer-events: none` on html/body + opt-back on
        //       `.fox`, `.idle-pill`, `#pet-menu`, `#pet-menu *` for
        //       the chrome bits that need to receive them.
        //   (2) A cached alpha mask + a JS hit-tester
        //       (`evaluateHitTest`) that decides "claim or pass through"
        //       on every `mousemove` / `pointerdown` and pushes the
        //       verdict to the Tauri window via `setIgnoreCursorEvents`.
        //   (3) A 4 Hz poll of `get_global_cursor_position` so the
        //       webview can detect "cursor drifted onto an opaque
        //       pixel" even while the window is in click-through mode
        //       (macOS won't deliver `mousemove` in that state).
        //
        // Constants — mirror `pet::window::build_pet_window`'s
        // PET_W / PET_H (logical px). A mismatch would mean the
        // alpha mask is sampled at a different resolution than the
        // window, and clicks would be classified against the wrong
        // pixel. ALPHA_THRESHOLD = 32: 16 flickers on antialiased
        // limbs; 64 carves out real pixels on thin parts of the
        // sprite. 32 is the middle ground.
        const MASK_W = 168;
        const MASK_H = 168;
        const ALPHA_THRESHOLD = 32;

        // device_query returns physical px (raw mouse coords). The
        // WebView's `e.clientX/Y` and the alpha mask index space are
        // in CSS px. On a retina display the conversion factor is the
        // window's scale_factor(); `window.devicePixelRatio` is the
        // webview's mirror of the same value.
        let petScale = window.devicePixelRatio || 1;

        // Per-URL alpha cache. `Map<url, Uint8ClampedArray>` lets
        // the JS reuse a single sample per sprite across all
        // (theme, state) pairs and across all cursor positions.
        const maskCache = new Map();
        // Alpha buffer for the sprite currently painted into the
        // fox <img>, plus its source URL. Both are read by
        // `isFoxPixelVisible` on every cursor move.
        let currentMask = null;
        let currentMaskUrl = null;

        // Transient lock — a counter incremented while a gesture is
        // mid-flight (drag start, menu open, cross-fade). While the
        // counter is > 0 the hit-tester returns `true` (claim) so a
        // gesture that started inside the pet can never silently
        // escape mid-gesture. The OS-level flag is mirrored in
        // `lastIgnoreState` so redundant IPC round-trips don't fire
        // on every mousemove.
        let transientLock = 0;
        let lastIgnoreState = null;

        // Last known cursor position in CSS px relative to the pet
        // window. Updated on every `mousemove` (DOM event while the
        // window is interactive) and on every 250 ms poll tick
        // (Tauri IPC while the window is in click-through mode).
        let lastCursorX = 0,
          lastCursorY = 0;

        // 4 Hz poller handle. Created/destroyed by `syncPollState`
        // based on `document.hidden`.
        let pollCursorInterval = null;

        // Sample the alpha channel of `currentMask` at (x, y) and
        // return true when the pixel is opaque enough to claim a
        // click. Bounds-checked so out-of-range CSS px return
        // `false` instead of reading garbage memory from
        // `currentMask[(y * MASK_W + x) * 4 + 3]`.
        function isFoxPixelVisible(x, y) {
          if (!currentMask) return false;
          if (x < 0 || y < 0 || x >= MASK_W || y >= MASK_H) return false;
          return currentMask[(y * MASK_W + x) * 4 + 3] >= ALPHA_THRESHOLD;
        }

        // Build / fetch the cached alpha buffer for the sprite
        // currently painted into the fox `<img>`. Called from
        // `setState()`'s `img.onload` BEFORE `fox.src = src` so the
        // very first `mousemove` after a cross-fade sees a valid
        // mask.
        function adoptMaskFromLoadedImage(img) {
          const url = img.src;
          let buf = maskCache.get(url);
          if (!buf) {
            const c = document.createElement("canvas");
            c.width = MASK_W;
            c.height = MASK_H;
            const cx = c.getContext("2d");
            cx.drawImage(img, 0, 0, MASK_W, MASK_H);
            const data = cx.getImageData(0, 0, MASK_W, MASK_H).data;
            buf = new Uint8ClampedArray(data.buffer.slice(0));
            maskCache.set(url, buf);
          }
          currentMask = buf;
          currentMaskUrl = url;
        }

        // True when the event target sits inside one of the
        // opt-back selectors (`.fox`, `.idle-pill`, `#pet-menu` and
        // its descendants). Used by `onPointerDown`'s early-return
        // branch and by `evaluateHitTest` (implicitly — the
        // body-class check covers in-progress gestures; the
        // per-event target check lives in `onPointerDown`).
        function isCursorOverInteractive(target) {
          if (!target) return false;
          // Opt-back selectors: .fox, .idle-pill, #pet-menu and its
          // descendants. `closest` is null-safe on plain nodes.
          return !!(
            target.closest &&
            (target.closest(".fox") ||
              target.closest(".idle-pill") ||
              target.closest("#pet-menu"))
          );
        }

        // The single decision point: should the next click be
        // claimed by the pet, or passed through to the underlying
        // app? Returning `true` claims; `false` passes through.
        //
        // Order matters (and is pinned by the tests):
        //   (a) the transient lock short-circuits to `true` so a
        //       gesture that started inside the pet can never
        //       silently escape mid-gesture;
        //   (b) body classes indicating an in-progress gesture
        //       (`dragging`, `longpress`, `petMenuOpen`) similarly
        //       short-circuit;
        //   (c) only if neither of those fire does the alpha mask
        //       get consulted.

        // instead of the default `pet:open-dashboard`).

          // therefore outside the alpha mask's index space) is
          // always claimed. The lock is released on the matching
          // `pointerup` because `evaluateAndApply` is called from
          // `onPointerMove` / `setState`'s rAF / `pollCursorOnce`,
          // none of which fire while a native drag is in progress.
          transientLockActive();
          // Immediately hand off to Tauri's native drag. The OS will move
          // the window and dispatch the corresponding pointermove/up events
          // on the new position. If the user releases without moving, the
          // pointerup distance will be ~0 and we treat it as a click.
          const w = getCurrentWindow();
          if (w && typeof w.startDragging === "function") {
            // startDragging returns a Promise; we don't await — the
            // pointermove/up handlers will pick up the new position via
            // the window's natural event flow.
            try {
              w.startDragging();
            } catch (_) {
              /* fall through */
            }
          }
          try {
            document.body.setPointerCapture(e.pointerId);
          } catch (_) {}
        }

        function onPointerMove(e) {
          if (dragged) return;
          if (
            Math.hypot(e.clientX - downX, e.clientY - downY) > DRAG_THRESHOLD
          ) {
            dragged = true;
            // A real drag breaks the long-press hold — drop the dots
            // and disarm the timer so it can't fire mid-drag.
            try {
              clearTimeout(longpressTimer);
            } catch (_) {}
            longpressTimer = null;
            if (longpressActive) {
              longpressActive = false;
              document.body.classList.remove("longpress");
            }
          }
        }

        function onPointerUp(e) {
          // #369 — symmetric to `onPointerDown`. A release inside the
          // open menu is a menu operation, not a pet click. Without
          // this guard the click-vs-drag branch below would emit
          // `pet:open-dashboard` immediately after the menu fires its
          // own event (e.g. `pet:open-settings`), opening the
          // dashboard on top of the settings page the user just
          // requested. Housekeeping is safe to skip here because
          // `onPointerDown` returned early too — no capture was taken,
          // no body classes were added, no longpress timer was armed.
          if (petMenuOpen && petMenu && petMenu.contains(e.target)) return;
          document.body.classList.remove("dragging");
          document.body.classList.remove("longpress");
          try {
            clearTimeout(longpressTimer);
          } catch (_) {}
          longpressTimer = null;
          try {
            document.body.releasePointerCapture(e.pointerId);
          } catch (_) {}
          // Click only fires if the pointer didn't travel far — anything
          // beyond DRAG_THRESHOLD counts as a drag, not a click.
          if (dragged) return;
          if (Math.hypot(e.clientX - downX, e.clientY - downY) > DRAG_THRESHOLD)
            return;

          // Long-press fallback (issue #314). If the user held the pet
          // without moving for ≥ LONGPRESS_MS, surface the in-widget
          // glass menu the same way a right-click would. Skipped if a
          // contextmenu already fired for this press so we don't open
          // it twice when both gestures arrive.
          const heldMs = Date.now() - downTime;
          if (heldMs >= LONGPRESS_MS && !contextmenuFiredSinceDown) {
            openPetMenu(e.clientX, e.clientY);
            return;
          }

          const t = window.__TAURI__;
          if (t && t.event && t.event.emit) {
            // On a fresh install the watcher emits `needs-setup` (see
            // `pet::watcher::watch_loop`'s one-shot bootstrap). When
            // that's the case, route the click straight to AI settings
            // — opening the dashboard would just land the user on the
            // guest-login redirect with no immediate path forward.
            if (currentState === "needs-setup") {
              t.event.emit("pet:open-ai-settings");
            } else if (isIdle()) {
              // #365 — idle pet click now opens the compact status
              // card instead of dumping the user onto the dashboard.
              // The right-click menu still offers "Open Loomi" as the
              // escape hatch to the main app for users who want to
              // land on /loop directly.
              t.event.emit("pet:open-status");
            } else {
              t.event.emit("pet:open-dashboard");
            }
          }
        }

        document.body.addEventListener("pointerdown", onPointerDown);
        document.body.addEventListener("pointermove", onPointerMove);
        document.body.addEventListener("pointerup", onPointerUp);
        document.body.addEventListener("pointercancel", onPointerUp);

        // ---- Tauri bridge ----------------------------------------------
        // Only attach the listener when running inside Tauri. When the
        // widget is opened standalone in a browser tab for preview, the
        // `__TAURI__` global is undefined and we silently no-op.
        const t = window.__TAURI__;
        if (t && t.event && t.event.listen) {
          t.event.listen("loop:state", (e) => {
            const p = (e && e.payload) || {};
            if (p.state) setState(p.state);
            // #365 — read the enriched fields so the idle pill can
            // switch its dot colour and so future updates can
            // surface the last-polled timestamp. Both fields are
            // optional on the wire — older hosts simply omit them.
            if (typeof p.enabled === "boolean") {
              loopEnabled = p.enabled;
              applyIdlePill();
            }
          });
          t.event.listen("loop:pending-count", (e) => {
            const p = (e && e.payload) || {};
            setPendingCount(p.count);
          });
        }

        // #365 — wire the idle pill. Click + Enter / Space while
        // focused emit `pet:open-status`. The handler stops
        // propagation so the same event doesn't bubble up to the
        // body's pointerdown (which would otherwise start a drag).
        if (idlePill) {
          idlePill.addEventListener("click", openStatusFromPill);
          idlePill.addEventListener("keydown", function (e) {
            if (e.key === "Enter" || e.key === " ") {
              openStatusFromPill(e);
            }
          });
          // Prevent the pill from initiating a window drag when the
          // user presses-and-holds it. Without `mousedown` capture
          // the body handler would still see the gesture and try
          // to `startDragging()` the whole window.
          idlePill.addEventListener("pointerdown", function (e) {
            e.stopPropagation();
          });
        }
        // `pet:config-changed` fires whenever the host reloads the
        // pet config — either because the user picked a new theme
        // from the right-click menu, because the file watcher
        // detected an external edit of `~/.openloomi/pet-config.json`,
        // or because the user dropped a new PNG into the custom
        // theme directory. Apply the fresh view and re-paint so
        // background edits show up without waiting for the next
        // state event.
        if (t && t.event && t.event.listen) {
          t.event.listen("pet:config-changed", (e) => {
            const p = (e && e.payload) || null;
            if (p) applyConfig(p);
          });
        }

        // ---- Boot -------------------------------------------------------
        // On cold boot we ask the host for the active theme +
        // overrides + custom theme list. We paint with `fox idle`
        // first (synchronous) so the user sees the pet instantly
        // while the invoke round-trips, then re-paint under the
        // resolved theme.
        setState("idle");
        if (t && t.core && t.core.invoke) {
          t.core
            .invoke("get_pet_config")
            .then((view) => {
              if (view) applyConfig(view);
            })
            .catch((err) => {
              console.warn("[loomi] get_pet_config failed", err);
            });
        }
      })();
    </script>
  </body>
</html>
