<!doctype html>
<!--
  Loomi · the pet widget

  Minimal frameless pet. No deck, no monologue panel, no tray — just a
  draggable fox on the desktop that:
    · listens to `loop:state` events from the Tauri host and swaps the
      displayed fox image to match the current state
    · uses the native Tauri `startDragging()` API so the whole 168×168
      window follows the pointer (not the image inside the window)
    · emits `pet:open-dashboard` on a real click (pointerup with no
      significant drag) so the host can show the main window

  The drag-vs-click distinction matters: without it, every release
  after a reposition would re-open the main window. We track total
  pointer travel between down and up; >4px = drag, ≤4px = click.

  State key → image filename is a flat lookup table. Anything not in
  the table falls back to `loomi-idle.png` so a typo'd state name from
  the host can never paint a blank frame.

  This file lives at the public root (not under loomi-pet/) so the
  loomi-pet/ directory stays purely a static asset bag. The Tauri
  `tauri.conf.json` window URL points here.

  In standalone preview (open this file in a browser without Tauri),
  the body grows to fill the viewport so the user can see the whole
  pet at a useful size, and the drop shadow is dropped (it would
  stack against the page background).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Loomi</title>
    <style>
      :root {
        /* Visual size in CSS px. The Tauri window is 168×168 logical, so
       this matches what the user sees on the desktop. In standalone
       preview the body grows to 100vw × 100vh, so this still keeps
       the fox at its natural size. */
        --size: 168px;
      }

      /* Standalone-preview fallback: when the page is opened in a plain
     browser (no Tauri), the body fills the viewport and the pet
     sits in the middle. The Tauri window has its own 168×168 box
     so this style only kicks in when `__TAURI__` is missing. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        -webkit-user-select: none;
        user-select: none;
        font-family: system-ui, sans-serif;
      }
      body {
        width: var(--size);
        height: var(--size);
        overflow: hidden;
        cursor: grab;
        /* Soft drop shadow gives the fox weight against any wallpaper.
       Matching the demo: 18px y-offset, 26px blur, 20% navy. */
        filter: drop-shadow(0 18px 26px rgba(24, 50, 84, 0.2));
      }
      body.dragging {
        cursor: grabbing;
      }

      /* The fox image. Per-state wobble animations are applied via the
     `[data-state]` attribute set by the JS bridge — each state
     triggers a different keyframe (wave / hop / tilt / nod / ...).
     The image is centered in its container; in Tauri the container
     is the whole window, in standalone it is the centered stage. */
      .fox {
        position: absolute;
        left: 50%;
        top: 50%;
        width: var(--size);
        height: var(--size);
        transform: translate(-50%, -50%);
        transform-origin: 50% 95%;
        display: block;
        pointer-events: auto;
        -webkit-user-drag: none;
        user-drag: none;
        animation: pet-bob 3.4s ease-in-out infinite;
      }

      /* State-specific animations — kept in sync with the demo's
     keyframes. If you add a new state, add a rule here AND an entry
     in the STATE_IMAGES map below. */
      .fox[data-state="greet"] {
        animation: pet-wave 2.4s ease-in-out infinite;
      }
      .fox[data-state="happy"] {
        animation: pet-hop 2.2s ease-in-out infinite;
      }
      .fox[data-state="thinking"] {
        animation: pet-tilt 2.6s ease-in-out infinite;
      }
      .fox[data-state="sweeping"] {
        animation: pet-sweep 2.8s ease-in-out infinite;
      }
      .fox[data-state="juggling"] {
        animation: pet-juggle 2.2s ease-in-out infinite;
      }
      .fox[data-state="working"] {
        animation: pet-nod 3.4s ease-in-out infinite;
      }
      .fox[data-state="needsinput"] {
        animation: pet-lean 2.6s ease-in-out infinite;
      }
      .fox[data-state="sleeping"] {
        animation: pet-breathe 4s ease-in-out infinite;
      }

      @keyframes pet-bob {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(0) rotate(-1deg);
        }
        50% {
          transform: translate(-50%, -50%) translateY(-4px) rotate(1deg);
        }
      }
      @keyframes pet-breathe {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
        }
        50% {
          transform: translate(-50%, -50%) scale(1.015);
        }
      }
      @keyframes pet-tilt {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(-3deg);
        }
        50% {
          transform: translate(-50%, -50%) rotate(3deg);
        }
      }
      @keyframes pet-sweep {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(-2deg) translateX(0);
        }
        50% {
          transform: translate(-50%, -50%) rotate(2deg) translateX(2px);
        }
      }
      @keyframes pet-juggle {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(0) rotate(-2deg);
        }
        50% {
          transform: translate(-50%, -50%) translateY(-5px) rotate(2deg);
        }
      }
      @keyframes pet-nod {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(0);
        }
        50% {
          transform: translate(-50%, -50%) translateY(1px);
        }
      }
      @keyframes pet-lean {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(0);
        }
        50% {
          transform: translate(-50%, -50%) rotate(3deg);
        }
      }
      @keyframes pet-hop {
        0%,
        100% {
          transform: translate(-50%, -50%) translateY(0) rotate(0) scale(1);
        }
        35% {
          transform: translate(-50%, -50%) translateY(-10px) rotate(-3deg)
            scale(1.03);
        }
        70% {
          transform: translate(-50%, -50%) translateY(-2px) rotate(2deg)
            scale(0.99);
        }
      }
      @keyframes pet-wave {
        0%,
        100% {
          transform: translate(-50%, -50%) rotate(0);
        }
        25% {
          transform: translate(-50%, -50%) rotate(-2deg);
        }
        75% {
          transform: translate(-50%, -50%) rotate(2deg);
        }
      }

      /* ---- Custom right-click menu ------------------------------------
       The 168×168 window is tiny, so the menu is positional (anchored
       down-right from the click) and clamped to the window bounds so
       it never overflows or clips. Background uses blur + dark glass
       so the menu reads against any wallpaper. */
      #pet-menu {
        position: fixed;
        z-index: 9999;
        min-width: 96px;
        /* The pet window is 168×168 but the menu (theme picker + a
           few shortcuts) is ~250px tall, so we cap the height and let
           it scroll rather than clip the Quit button. `calc(100vh -
           8px)` adapts to both Tauri (vh = window height = 168) and
           standalone preview (vh = browser viewport). */
        max-height: calc(100vh - 8px);
        overflow-y: auto;
        padding: 4px;
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        box-shadow: 0 16px 28px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 12px;
        color: #f1f5f9;
        display: none;
        -webkit-user-select: none;
        user-select: none;
      }
      /* Slim webkit scrollbar so the scroll affordance doesn't crowd
         the 12px menu text. Falls back to platform default in
         non-webkit browsers (rare for the Tauri webview, but safe). */
      #pet-menu::-webkit-scrollbar {
        width: 6px;
      }
      #pet-menu::-webkit-scrollbar-track {
        background: transparent;
      }
      #pet-menu::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
      }
      #pet-menu::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.25);
      }
      #pet-menu.visible {
        display: block;
      }
      #pet-menu button {
        display: block;
        width: 100%;
        padding: 4px 12px;
        margin: 0;
        background: transparent;
        border: 0;
        color: inherit;
        font: inherit;
        text-align: left;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
      }
      #pet-menu button:hover,
      #pet-menu button:focus-visible {
        background: rgba(255, 255, 255, 0.08);
        outline: 0;
      }
      #pet-menu hr {
        border: 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        margin: 2px 2px;
      }
      /* Theme picker tick — only the active theme shows the ✓.
         Kept out of the button text so the label can wrap on long
         custom-theme names without reflowing the tick. */
      .menu-tick {
        display: inline-block;
        width: 12px;
        margin-right: 4px;
        opacity: 0;
        color: #34d399;
        font-weight: 700;
      }
      .menu-tick.active {
        opacity: 1;
      }
      /* Subtle separator within the theme list — separates built-ins
         from custom themes the user has added. */
      .menu-separator {
        padding: 2px 12px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <img class="fox" id="fox" data-state="idle" alt="Loomi" draggable="false" />

    <div id="pet-menu" role="menu" aria-hidden="true">
      <button type="button" data-op="open" role="menuitem">Open Loomi</button>
      <button type="button" data-op="settings" role="menuitem">Settings</button>
      <hr />
      <div class="menu-separator">Theme</div>
      <button type="button" data-op="theme-fox" role="menuitem">
        <span class="menu-tick active" data-theme-tick="fox">✓</span>Fox
      </button>
      <button type="button" data-op="theme-capybara" role="menuitem">
        <span class="menu-tick" data-theme-tick="capybara">✓</span>Capybara
      </button>
      <!-- Custom theme buttons injected at boot by applyConfig(view). -->
      <hr />
      <button type="button" data-op="quit" role="menuitem">Quit</button>
    </div>

    <script>
      (function () {
        "use strict";

        // Two built-in themes ship with the app. Each maps a state key
        // to a PNG filename in the theme's directory. The directory
        // layout matches `apps/web/public/loomi-pet/assets/<theme>/`,
        // which is bundled by the public/ resource pattern in
        // tauri.conf.json (`../.next/standalone/apps/web/public/**/*`).
        //
        // Juggling note: the original `loomi-info.png` (1.5 MB) was
        // assigned to `juggling` by mistake. The real juggling sprite
        // is `loomi-juggling.png` (52 KB). This map now points at the
        // correct file.
        //
        // `presenting` is the post-completion handoff state — the fox
        // has no dedicated sprite for it yet, so we fall back to
        // `happy` until assets land.
        const BUILTIN_THEMES = {
          fox: {
            baseDir: "loomi-pet/assets/fox/",
            states: {
              idle: "loomi-idle.png",
              thinking: "loomi-thinking.png",
              sweeping: "loomi-sweeping.png",
              working: "loomi-working.png",
              needsinput: "loomi-needsinput.png",
              greet: "loomi-greet.png",
              sleeping: "loomi-sleeping.png",
              juggling: "loomi-juggling.png",
              happy: "loomi-happy.png",
              presenting: "loomi-happy.png",
            },
          },
          capybara: {
            baseDir: "loomi-pet/assets/capybara/",
            states: {
              idle: "capybara-idle.png",
              thinking: "capybara-thinking.png",
              sweeping: "capybara-sweeping.png",
              working: "capybara-working.png",
              needsinput: "capybara-needsinput.png",
              greet: "capybara-idle.png",
              sleeping: "capybara-sleeping.png",
              juggling: "capybara-juggling.png",
              happy: "capybara-happy.png",
              presenting: "capybara-presenting.png",
            },
          },
        };
        const FALLBACK = "loomi-pet/assets/fox/loomi-idle.png";

        // Runtime overrides — populated from `PetConfigView.overrides`
        // when the host returns the config on boot (and again on every
        // `pet:config-changed` event). Shape:
        //   overrideMap[theme][state] = { kind: "asset", path: string }
        //                              | { kind: "absolute", path: string }
        let overrideMap = {};

        // Currently active theme name. Defaulted to `fox` for the
        // standalone-preview path (no Tauri host); replaced on boot
        // by `get_pet_config`.
        let currentTheme = "fox";
        // Custom theme names discovered on the host's
        // `~/.openloomi/pet-custom/` directory. Refreshed on every
        // config event. The widget renders one menu button per entry.
        let customThemes = [];

        const fox = document.getElementById("fox");
        // Tracked alongside `fox.dataset.state` so the click handler can
        // branch on it (e.g. `needs-setup` → `pet:open-ai-settings`
        // instead of the default `pet:open-dashboard`).
        let currentState = "idle";

        // Resolve a sprite URL/path for an (theme, state) pair.
        // Priority:
        //   1. runtime override (user-configured per-theme, per-state)
        //   2. built-in theme map
        //   3. fox idle fallback (so we never paint a broken image)
        //
        // `override.kind === "absolute"` means the user gave us a
        // path on disk — we route it through `convertFileSrc` so the
        // webview can fetch it via Tauri's asset:// protocol. Anything
        // else is a relative URL to the bundled asset.
        function imageFor(theme, state) {
          const ov = overrideMap[theme] && overrideMap[theme][state];
          if (ov) {
            if (ov.kind === "absolute") {
              const t = window.__TAURI__;
              if (t && t.core && typeof t.core.convertFileSrc === "function") {
                return t.core.convertFileSrc(ov.path);
              }
              return ov.path;
            }
            return ov.path;
          }
          const t = BUILTIN_THEMES[theme];
          if (t && t.states[state]) return t.baseDir + t.states[state];
          return FALLBACK;
        }

        // Apply a fresh `PetConfigView` payload. Rebuilds the override
        // map, swaps the active theme, refreshes the right-click
        // menu's theme picker, and re-paints the current sprite so a
        // background theme change is visible without waiting for the
        // next state event.
        function applyConfig(view) {
          if (!view || typeof view !== "object") return;
          if (typeof view.activeTheme === "string" && view.activeTheme) {
            currentTheme = view.activeTheme;
          }
          overrideMap = (view && view.overrides) || {};
          customThemes = Array.isArray(view.customThemes)
            ? view.customThemes.slice()
            : [];
          rebuildThemeButtons();
          updateThemeTicks();
          // Re-paint with the current state under the new theme so
          // the user sees the change immediately.
          if (currentState) setState(currentState);
        }

        // Add menu buttons for any custom theme names not already
        // present in the DOM. Called on boot and after every config
        // event. Built-in entries are statically rendered in the
        // HTML, so we only touch custom themes here.
        function rebuildThemeButtons() {
          const menu = document.getElementById("pet-menu");
          if (!menu) return;
          // Remove previously injected custom-theme buttons so a
          // directory rename doesn't leave stale entries behind.
          menu
            .querySelectorAll(
              "button[data-op^='theme-']:not([data-op='theme-fox']):not([data-op='theme-capybara'])",
            )
            .forEach((el) => el.remove());
          // Insertion point: right after the capybara built-in button
          // (so the menu reads fox → capybara → my-pack → ...).
          const anchor = menu.querySelector("[data-op='theme-capybara']");
          if (!anchor) return;
          for (const name of customThemes) {
            // Skip the built-in names — they already have buttons.
            if (name === "fox" || name === "capybara") continue;
            const btn = document.createElement("button");
            btn.type = "button";
            btn.setAttribute("role", "menuitem");
            btn.dataset.op = "theme-" + name;
            const tick = document.createElement("span");
            tick.className = "menu-tick";
            tick.dataset.themeTick = name;
            tick.textContent = "✓";
            btn.appendChild(tick);
            btn.appendChild(document.createTextNode(" " + name));
            // Insert after the anchor; if multiple, they appear in
            // alphabetical order (customThemes is sorted by the host).
            anchor.insertAdjacentElement("afterend", btn);
          }
        }

        // Toggle the ✓ indicator on the active theme's button.
        function updateThemeTicks() {
          document.querySelectorAll("[data-theme-tick]").forEach((el) => {
            el.classList.toggle(
              "active",
              el.dataset.themeTick === currentTheme,
            );
          });
        }

        // Standalone-preview detection. When the page is opened in a plain
        // browser, `__TAURI__` is undefined and the body grows to 100vw ×
        // 100vh so the 168×168 fox sits in a comfortable stage rather than
        // being squeezed into a tiny box.
        const inTauri = !!(window.__TAURI__ && window.__TAURI__.window);
        if (!inTauri) {
          document.body.style.width = "100vw";
          document.body.style.height = "100vh";
          // Drop the drop-shadow in preview mode; against a page background
          // it would be visible as a soft halo, not the desktop feel.
          document.body.style.filter = "none";
        }

        function setState(key) {
          if (!key || typeof key !== "string") return;
          currentState = key;
          fox.dataset.state = key;
          const src = imageFor(currentTheme, key);
          if (fox.getAttribute("src") !== src) {
            // Cross-fade the swap so the eye doesn't catch the load flicker.
            fox.style.opacity = "0";
            // Preload the next frame before flipping src, so we paint
            // completed pixels in one step.
            const img = new Image();
            img.onload = function () {
              fox.src = src;
              // rAF ensures the new src is committed before we re-fade in.
              requestAnimationFrame(() => {
                fox.style.opacity = "";
              });
            };
            img.onerror = function () {
              // If a state has no asset (e.g. demo-only ones not bundled),
              // fall back to idle so we never paint a broken image icon.
              fox.src = FALLBACK;
              fox.style.opacity = "";
            };
            img.src = src;
          }
        }

        // ---- Custom right-click menu ----------------------------------
        // The 168×168 widget is too small for a system-tray dropdown and
        // too prominent for an Inspector menu. We swallow the native
        // context menu globally and render a small, in-window glass menu
        // anchored to the click — clamped so it stays inside 168×168.
        const petMenu = document.getElementById("pet-menu");
        let petMenuOpen = false;

        function openPetMenu(x, y) {
          // Measure after first paint so getBoundingClientRect is real.
          petMenu.style.left = "0px";
          petMenu.style.top = "0px";
          petMenu.classList.add("visible");
          petMenu.setAttribute("aria-hidden", "false");
          const r = petMenu.getBoundingClientRect();
          // Anchor: down-right from cursor, clamped to 168×168. When
          // the menu would overflow the bottom (common — the menu has
          // ~7 entries but the window is only 168px tall) flip it
          // upward so the user still sees the top of the menu near
          // the cursor. The CSS caps menu height at `100vh - 8px` so
          // `r.height` is bounded and the clamp is well-defined.
          const winW = document.documentElement.clientWidth || 168;
          const winH = document.documentElement.clientHeight || 168;
          const left = Math.max(0, Math.min(winW - r.width, x));
          let top = y;
          if (top + r.height > winH) {
            top = Math.max(0, y - r.height);
          }
          petMenu.style.left = left + "px";
          petMenu.style.top = top + "px";
          petMenuOpen = true;
        }

        function closePetMenu() {
          if (!petMenuOpen) return;
          petMenu.classList.remove("visible");
          petMenu.setAttribute("aria-hidden", "true");
          petMenuOpen = false;
        }

        window.addEventListener("contextmenu", function (e) {
          e.preventDefault();
          openPetMenu(e.clientX, e.clientY);
        });

        // Click anywhere outside the menu closes it. We use `click` (not
        // `mousedown`) so a click on a menu button completes its full
        // mousedown → mouseup → click cycle on the button first; an
        // earlier `mousedown` listener that hides the menu via display:none
        // suppresses the synthetic click before it bubbles to the menu.
        document.addEventListener("click", function (e) {
          if (petMenuOpen && !petMenu.contains(e.target)) closePetMenu();
        });

        // Lose focus → close. The pet window is small enough that any
        // out-of-window click usually means the user moved on.
        window.addEventListener("blur", closePetMenu);

        petMenu.addEventListener("click", function (e) {
          const op = e.target && e.target.dataset && e.target.dataset.op;
          if (!op) return;
          closePetMenu();
          const t = window.__TAURI__;
          if (!t) return;
          // Theme switcher + custom shortcuts go through core.invoke
          // (commands) rather than event.emit — the host writes the
          // new theme to disk and broadcasts the change back via
          // `pet:config-changed`. Open / Settings / Quit remain event
          // emits because they are transient UI gestures, not state
          // changes.
          if (op.startsWith("theme-")) {
            const themeName = op.slice("theme-".length);
            if (t.core && t.core.invoke) {
              t.core
                .invoke("set_active_theme", { themeName: themeName })
                .then((view) => {
                  if (view) applyConfig(view);
                })
                .catch((err) => {
                  console.warn("[loomi] set_active_theme failed", err);
                });
            }
            return;
          }
          if (!t.event || !t.event.emit) return;
          if (op === "open") t.event.emit("pet:open-dashboard");
          else if (op === "settings") t.event.emit("pet:open-settings");
          else if (op === "quit") t.event.emit("pet:quit");
        });

        // ---- Drag (whole window) vs click (no drag) --------------------
        // In Tauri: call `getCurrentWebviewWindow().startDragging()` so the
        //   168×168 window itself follows the pointer. The native drag is
        //   OS-mediated and survives the cursor leaving the window, so the
        //   user can fling the pet across multiple monitors.
        // In standalone: no-op drag (the page is the stage). The click
        //   branch is silently disabled because there is nothing to open.
        let downX = 0,
          downY = 0;
        let dragged = false;
        const DRAG_THRESHOLD = 4; // px

        function getCurrentWindow() {
          const t = window.__TAURI__;
          if (!t) return null;
          // Tauri 2.x with `withGlobalTauri: true` exposes the current
          // webview's owning window under `__TAURI__.webviewWindow`. The
          // older `__TAURI__.window` (manager) only has helpers like
          // getCurrent() which returns a Window, not a WebviewWindow —
          // startDragging is on Window, but the getCurrent() call returns
          // a *plain* Window, not the webview, and the OS may refuse the
          // drag if the call doesn't match the focused webview's window.
          // webviewWindow.getCurrentWebviewWindow() is the precise match.
          if (t.webviewWindow && t.webviewWindow.getCurrentWebviewWindow) {
            return t.webviewWindow.getCurrentWebviewWindow();
          }
          // Older Tauri 1.x fallback. Removed in 2.x but kept here in case
          // the bundle is older than the host.
          if (t.window && t.window.getCurrent) {
            return t.window.getCurrent();
          }
          return null;
        }

        function onPointerDown(e) {
          if (e.button !== 0) return; // primary button only
          downX = e.clientX;
          downY = e.clientY;
          dragged = false;
          document.body.classList.add("dragging");
          // Immediately hand off to Tauri's native drag. The OS will move
          // the window and dispatch the corresponding pointermove/up events
          // on the new position. If the user releases without moving, the
          // pointerup distance will be ~0 and we treat it as a click.
          const w = getCurrentWindow();
          if (w && typeof w.startDragging === "function") {
            // startDragging returns a Promise; we don't await — the
            // pointermove/up handlers will pick up the new position via
            // the window's natural event flow.
            try {
              w.startDragging();
            } catch (_) {
              /* fall through */
            }
          }
          try {
            document.body.setPointerCapture(e.pointerId);
          } catch (_) {}
        }

        function onPointerMove(e) {
          if (dragged) return;
          if (
            Math.hypot(e.clientX - downX, e.clientY - downY) > DRAG_THRESHOLD
          ) {
            dragged = true;
          }
        }

        function onPointerUp(e) {
          document.body.classList.remove("dragging");
          try {
            document.body.releasePointerCapture(e.pointerId);
          } catch (_) {}
          // Click only fires if the pointer didn't travel far — anything
          // beyond DRAG_THRESHOLD counts as a drag, not a click.
          if (dragged) return;
          if (Math.hypot(e.clientX - downX, e.clientY - downY) > DRAG_THRESHOLD)
            return;

          const t = window.__TAURI__;
          if (t && t.event && t.event.emit) {
            // On a fresh install the watcher emits `needs-setup` (see
            // `pet::watcher::watch_loop`'s one-shot bootstrap). When
            // that's the case, route the click straight to AI settings
            // — opening the dashboard would just land the user on the
            // guest-login redirect with no immediate path forward.
            if (currentState === "needs-setup") {
              t.event.emit("pet:open-ai-settings");
            } else {
              t.event.emit("pet:open-dashboard");
            }
          }
        }

        document.body.addEventListener("pointerdown", onPointerDown);
        document.body.addEventListener("pointermove", onPointerMove);
        document.body.addEventListener("pointerup", onPointerUp);
        document.body.addEventListener("pointercancel", onPointerUp);

        // ---- Tauri bridge ----------------------------------------------
        // Only attach the listener when running inside Tauri. When the
        // widget is opened standalone in a browser tab for preview, the
        // `__TAURI__` global is undefined and we silently no-op.
        const t = window.__TAURI__;
        if (t && t.event && t.event.listen) {
          t.event.listen("loop:state", (e) => {
            const p = (e && e.payload) || {};
            if (p.state) setState(p.state);
          });
        }
        // `pet:config-changed` fires whenever the host reloads the
        // pet config — either because the user picked a new theme
        // from the right-click menu, because the file watcher
        // detected an external edit of `~/.openloomi/pet-config.json`,
        // or because the user dropped a new PNG into the custom
        // theme directory. Apply the fresh view and re-paint so
        // background edits show up without waiting for the next
        // state event.
        if (t && t.event && t.event.listen) {
          t.event.listen("pet:config-changed", (e) => {
            const p = (e && e.payload) || null;
            if (p) applyConfig(p);
          });
        }

        // ---- Boot -------------------------------------------------------
        // On cold boot we ask the host for the active theme +
        // overrides + custom theme list. We paint with `fox idle`
        // first (synchronous) so the user sees the pet instantly
        // while the invoke round-trips, then re-paint under the
        // resolved theme.
        setState("idle");
        if (t && t.core && t.core.invoke) {
          t.core
            .invoke("get_pet_config")
            .then((view) => {
              if (view) applyConfig(view);
            })
            .catch((err) => {
              console.warn("[loomi] get_pet_config failed", err);
            });
        }
      })();
    </script>
  </body>
</html>
